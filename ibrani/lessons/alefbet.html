<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabet - Hebrew Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../ibrani.css">
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body data-page="lesson1" class="ibrani-page theme-alphabet bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans min-h-screen flex flex-col transition-colors duration-300">

    <header class="ibrani-header text-white shadow-md transition-colors duration-300">
        <div class="max-w-5xl mx-auto px-4 py-2 sm:py-4 flex flex-col sm:flex-row justify-between items-center gap-2 sm:gap-4">
            <div class="text-center sm:text-left flex-1 flex items-center gap-4">
                <div>
                    <a href="../ibrani_index.html" class="block">
                        <div class="bilingual-line title-bilingual text-2xl font-bold">
                            <h1 data-i18n="title">Hebrew Practice</h1>
                            <p class="hebrew-side">&#1514;&#1512;&#1490;&#1493;&#1500; &#1506;&#1489;&#1512;&#1497;&#1514;</p>
                        </div>
                    </a>
                    <p class="text-sm text-blue-200 dark:text-blue-300" data-i18n="alpha_title">The Hebrew Alphabet</p>
                </div>
            </div>

            <div class="flex items-center justify-center gap-4 w-full sm:w-auto mt-2 sm:mt-0">
                <button onclick="toggleTheme()" class="p-2 rounded-full bg-blue-700 dark:bg-blue-800 hover:bg-blue-800 dark:hover:bg-blue-700 transition" aria-label="Toggle Dark Mode">
                    <svg id="theme-icon-moon" class="w-6 h-6 hidden dark:block text-yellow-300" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg id="theme-icon-sun" class="w-6 h-6 block dark:hidden text-yellow-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" stroke-width="2"></circle><path stroke-linecap="round" stroke-width="2" d="M12 2v2.5M12 19.5V22M4.93 4.93l1.77 1.77M17.3 17.3l1.77 1.77M2 12h2.5M19.5 12H22M4.93 19.07l1.77-1.77M17.3 6.7l1.77-1.77"/></svg>
                </button>

                <div class="lang-shell flex items-center gap-3 px-4 py-2 rounded-xl">
                    <span class="text-sm font-bold text-white" id="lbl-ku">KU</span>
                    <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="lang-toggle" onclick="toggleLanguage()" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-slate-300 dark:border-slate-500 appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10 top-0 left-0 checked:translate-x-6 checked:border-green-500"/>
                        <label for="lang-toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 dark:bg-slate-500 cursor-pointer transition-colors duration-200 ease-in-out"></label>
                    </div>
                    <span class="text-sm font-bold text-slate-300 dark:text-slate-400" id="lbl-en">EN</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-5xl mx-auto w-full px-4 py-6 sm:py-8 space-y-10">
        <div class="page-switch flex flex-col sm:flex-row sm:flex-wrap sm:items-center gap-3">
            <a href="../ibrani_index.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                <span data-i18n="course_home">Course Home</span>
            </a>
            <button type="button" onclick="switchTab('reference')" id="btn-reference" class="inline-flex items-center px-4 py-2 rounded-full transition font-semibold" data-i18n="nav_lesson">Lesson</button>
            <button type="button" onclick="switchTab('flashcards')" id="btn-flashcards" class="inline-flex items-center px-4 py-2 rounded-full transition font-semibold" data-i18n="btn_flash">Flashcards</button>
            <a href="./alefbet-games.html" class="inline-flex items-center px-4 py-2 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 transition font-semibold" data-i18n="nav_games">Games</a>
        </div>

        <div id="view-tools" class="block space-y-10">
            <div class="mb-6 sm:mb-8 flex flex-col sm:flex-row justify-center gap-3 sm:gap-4 px-2 sm:px-0">
                <button onclick="setCategory('letters')" id="cat-letters" class="cat-btn w-full sm:w-auto px-6 py-3 sm:py-2 rounded-full border-2 font-bold shadow-sm transition text-lg sm:text-base" data-i18n="cat_letters">Letters</button>
                <button onclick="setCategory('nikud')" id="cat-nikud" class="cat-btn w-full sm:w-auto px-6 py-3 sm:py-2 rounded-full border-2 font-bold shadow-sm transition text-lg sm:text-base" data-i18n="cat_nikud">Nikud</button>
            </div>

            <section id="sec-reference" class="block">
                <div class="bg-white dark:bg-slate-800 rounded-xl shadow-md overflow-x-auto border border-slate-100 dark:border-slate-700 transition-colors duration-300">
                    <table class="w-full text-left border-collapse min-w-[600px]">
                        <thead>
                            <tr class="bg-slate-100 dark:bg-slate-900 border-b-2 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300">
                                <th class="p-4 font-semibold w-1/4" data-i18n="col_heb">Hebrew</th>
                                <th class="p-4 font-semibold w-1/4" data-i18n="col_name">Name</th>
                                <th class="p-4 font-semibold w-1/4" data-i18n="col_sound">Sound</th>
                                <th class="p-4 font-semibold w-1/4" data-i18n="col_ex">Example</th>
                            </tr>
                        </thead>
                        <tbody id="reference-tbody" class="divide-y divide-slate-200 dark:divide-slate-700"></tbody>
                    </table>
                </div>
            </section>

            <section id="sec-flashcards" class="hidden">
                <div class="flex flex-col items-center">
                    <p class="mb-4 text-slate-500 dark:text-slate-400 font-medium text-center max-w-md" data-i18n="fc_instruction">Click the card to reveal its sound and meaning.</p>
                    <div class="w-full max-w-md h-[30rem] sm:h-[26rem] perspective-1000 mb-8 cursor-pointer group rounded-2xl overflow-hidden" onclick="flipCard()">
                        <div id="flashcard-inner" class="relative w-full h-full transform-style-3d transition-transform shadow-xl rounded-2xl group-hover:shadow-2xl">
                            <div class="absolute inset-0 w-full h-full backface-hidden bg-white dark:bg-slate-800 rounded-2xl border-4 border-blue-100 dark:border-blue-900 flex items-center justify-center overflow-hidden transition-colors duration-300">
                                <span id="fc-front-char" class="text-[6rem] sm:text-[10rem] leading-none font-bold text-slate-800 dark:text-slate-100">&#1488;</span>
                            </div>
                            <div class="absolute inset-0 w-full h-full backface-hidden rotate-y-180 bg-blue-50 dark:bg-slate-700 rounded-2xl border-4 border-blue-200 dark:border-blue-800 flex flex-col justify-center gap-5 sm:gap-6 p-5 sm:p-7 text-center overflow-y-auto transition-colors duration-300">
                                <div class="flex flex-col items-center flex-shrink-0">
                                    <p class="mb-2 text-xs sm:text-sm font-bold text-blue-900 dark:text-blue-200 uppercase tracking-[0.22em]" data-i18n="fc_sound_label">SOUND</p>
                                    <p id="fc-back-sound" class="max-w-[12ch] text-3xl sm:text-5xl leading-tight font-black text-blue-700 dark:text-blue-300">a / e</p>
                                    <div class="mt-5 w-full max-w-xs border-t border-blue-200 dark:border-slate-600 pt-4">
                                        <p class="mb-1 text-xs sm:text-sm font-bold text-blue-900 dark:text-blue-200 uppercase tracking-[0.22em]">NAME</p>
                                        <h2 id="fc-back-name" class="text-xl sm:text-2xl font-semibold text-slate-700 dark:text-slate-200">Alef</h2>
                                    </div>
                                </div>
                                <div class="border-t border-blue-200 dark:border-slate-600 pt-4 flex-shrink-0">
                                    <p class="text-xs sm:text-sm font-bold text-blue-900 dark:text-blue-200 uppercase tracking-[0.22em] mb-2" data-i18n="fc_ex_label">EXAMPLE</p>
                                    <p id="fc-back-example-he" class="text-3xl sm:text-4xl font-bold mb-2 text-slate-800 dark:text-slate-100" dir="rtl">&#1488;&#1464;&#1489;</p>
                                    <p id="fc-back-example-trans" class="text-base sm:text-lg text-slate-600 dark:text-slate-300 font-medium">Av (father)</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 sm:gap-4 w-full max-w-md justify-center">
                        <button onclick="flipCard()" class="px-6 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold shadow transition" data-i18n="fc_flip">Flip</button>
                        <button onclick="nextCard()" class="px-6 py-3 rounded-xl bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-bold shadow transition" data-i18n="fc_next">Next</button>
                    </div>
                    <p id="fc-counter" class="mt-4 text-slate-400 dark:text-slate-500 font-bold tracking-widest">1 / 22</p>
                </div>
            </section>
        </div>
    </main>

    <script src="../ibrani_data.js"></script>
    <script src="../ibrani_app.js"></script>
</body>
</html>
