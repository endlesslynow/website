<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habibi</title>
  <style>
    :root {
      --ink: #1f2937;
      --label: #6b21a8;
      --border: #d8b4fe;
      --field: #faf5ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.75), transparent 35%),
        linear-gradient(160deg, #ffd8ea 0%, #ffeec7 100%);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(100%, 420px);
    }

    h1 {
      margin: 0 0 24px;
      text-align: center;
      color: var(--label);
      font-size: 2.2rem;
    }

    .menu {
      display: grid;
      gap: 16px;
    }

    a.tool {
      display: block;
      background: #ffffff;
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 20px 22px;
      text-decoration: none;
      color: var(--ink);
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    a.tool:hover {
      border-color: var(--label);
      background: var(--field);
    }

    a.tool .tool-name {
      display: block;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--label);
    }

    a.tool .tool-desc {
      display: block;
      margin-top: 6px;
      font-size: 0.95rem;
      color: #6b7280;
    }

    .reminders-shell {
      background: #ffffff;
      border: 2px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .reminders-shell iframe {
      display: block;
      width: 100%;
      border: 0;
      height: 420px;
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>Habibi</h1>

    <div class="reminders-shell" id="reminders-shell">
      <iframe id="reminders-frame" title="Reminders" scrolling="no"
        src="https://script.google.com/macros/s/AKfycbynTo_fuy09h4OdRopmt0B9Dru4mN5R84tMr5YH3XRf3ZYsrm-BeztudQGYbaHcu-ozNw/exec?view=reminders"></iframe>
    </div>

    <nav class="menu">
      <a class="tool" href="habibi_audio.html">
        <span class="tool-name">Whatsapp Audio Converter</span>
        <span class="tool-desc">Turn a WhatsApp voice note into an MP3 file</span>
      </a>

      <a class="tool" href="habibi_time.html">
        <span class="tool-name">Time Calculator</span>
        <span class="tool-desc">Von, Bis, and the new Bis</span>
      </a>

      <a class="tool" href="https://script.google.com/macros/s/AKfycbynTo_fuy09h4OdRopmt0B9Dru4mN5R84tMr5YH3XRf3ZYsrm-BeztudQGYbaHcu-ozNw/exec">
        <span class="tool-name">Work Hours</span>
        <span class="tool-desc">Add work days, vacation days, and see your overtime</span>
      </a>

      <a class="tool" href="https://script.google.com/macros/s/AKfycbynTo_fuy09h4OdRopmt0B9Dru4mN5R84tMr5YH3XRf3ZYsrm-BeztudQGYbaHcu-ozNw/exec?tab=family">
        <span class="tool-name">Family To-Do</span>
        <span class="tool-desc">What needs doing for each family</span>
      </a>

      <a class="tool" href="https://script.google.com/macros/s/AKfycbynTo_fuy09h4OdRopmt0B9Dru4mN5R84tMr5YH3XRf3ZYsrm-BeztudQGYbaHcu-ozNw/exec?tab=clients">
        <span class="tool-name">Client Hours</span>
        <span class="tool-desc">Weekly hours for each client, with spillover</span>
      </a>
    </nav>
  </main>

  <script>
    (function () {
      var frame = document.getElementById('reminders-frame');
      var shell = document.getElementById('reminders-shell');
      var loaded = false;

      window.addEventListener('message', function (event) {
        var okOrigin = /https:\/\/([a-z0-9-]+\.)*googleusercontent\.com$|https:\/\/script\.google\.com$/.test(event.origin);
        var data = event.data;
        if (!okOrigin || !data || data.habibiReminders !== 'height') {
          return;
        }
        loaded = true;
        var height = Math.max(160, Math.min(2600, Number(data.height) || 0));
        frame.style.height = height + 'px';
      });

      setTimeout(function () {
        if (loaded) {
          return;
        }
        var link = document.createElement('a');
        link.className = 'tool';
        link.href = frame.src;
        link.style.marginBottom = '16px';
        var name = document.createElement('span');
        name.className = 'tool-name';
        name.textContent = 'Reminders';
        var desc = document.createElement('span');
        desc.className = 'tool-desc';
        desc.textContent = 'The reminders could not load here. Tap to open them.';
        link.appendChild(name);
        link.appendChild(desc);
        shell.parentNode.replaceChild(link, shell);
      }, 9000);
    })();
  </script>
</body>
</html>
