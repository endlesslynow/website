<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Work Hours</title>
  <style>
    :root {
      --bg: #fdf1f3;
      --panel: #ffffff;
      --text: #3d2228;
      --muted: #8a4a57;
      --orange: #e96b12;
      --orange-dark: #c25409;
      --coral: #dd3d45;
      --coral-dark: #b52830;
      --pink: #c22f7d;
      --pink-dark: #9c1f61;
      --berry: #96305c;
      --tile: #fbdfe3;
      --error: #b42318;
      --error-bg: #fdeaea;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      padding: 18px 14px 40px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 19px;
      line-height: 1.45;
    }

    main {
      width: min(100%, 460px);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    h1 {
      margin: 4px 0 0;
      font-size: 34px;
      text-align: center;
      color: var(--coral-dark);
    }

    section {
      background: var(--panel);
      border-radius: 18px;
      overflow: hidden;
    }

    section.work { border: 3px solid var(--coral); }
    section.vacation { border: 3px solid var(--pink); }

    h2 {
      margin: 0;
      padding: 14px 20px;
      font-size: 22px;
      color: #ffffff;
    }

    section.work h2 { background: var(--coral); }
    section.vacation h2 { background: var(--pink); }

    .card-body { padding: 18px 16px; }

    form { display: grid; gap: 16px; }

    label.field {
      display: grid;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
    }

    .date-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
    }

    .date-row input[type="date"] {
      flex: 0 1 auto;
      width: auto;
      min-width: 0;
      font-size: 18px;
      padding: 10px 8px;
    }

    .day-inline {
      font-size: 21px;
      font-weight: 800;
      color: var(--pink);
      white-space: nowrap;
    }

    input[type="date"], input[type="time"] {
      width: 100%;
      min-height: 56px;
      border: 2px solid var(--coral);
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      font-size: 20px;
      background: #ffffff;
      color: var(--text);
    }

    section.vacation input[type="date"] { border-color: var(--pink); }

    input:focus {
      outline: 4px solid rgba(221, 61, 69, 0.3);
    }

    .time-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .time-row input[type="time"] {
      font-size: 46px;
      font-weight: 800;
      min-height: 88px;
      text-align: center;
      padding: 6px 8px;
      min-width: 0;
    }

    .break-row input[type="time"] {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      min-width: 0;
      padding: 10px 6px;
    }

    .breaks-title {
      font-size: 18px;
      font-weight: 700;
      margin: 4px 0 0;
    }

    #break-list { display: grid; gap: 10px; }

    .break-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 2px solid var(--tile);
      border-radius: 12px;
    }

    .remove-break {
      grid-column: 1 / -1;
      min-height: 48px;
      padding: 0 14px;
      border: 2px solid var(--coral);
      border-radius: 12px;
      background: #ffffff;
      color: var(--coral);
      font: inherit;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .add-break {
      min-height: 54px;
      border: 2px solid var(--coral);
      border-radius: 12px;
      background: #ffffff;
      color: var(--coral);
      font: inherit;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .preview {
      background: var(--tile);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      color: var(--berry);
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview.bad {
      color: var(--error);
      background: var(--error-bg);
    }

    button.primary {
      min-height: 62px;
      border: 0;
      border-radius: 14px;
      padding: 14px;
      font: inherit;
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
      background: var(--coral);
      cursor: pointer;
    }

    button.primary:hover { background: var(--coral-dark); }

    button.vacation-btn { background: var(--pink); }
    button.vacation-btn:hover { background: var(--pink-dark); }

    label.check {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 18px;
      font-weight: 700;
      background: var(--tile);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
    }

    label.check input {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      accent-color: var(--pink);
    }

    .note {
      margin: 0;
      font-size: 15px;
      color: var(--muted);
      text-align: center;
    }

    a.app-link {
      display: block;
      text-align: center;
      padding: 18px;
      border: 3px solid var(--orange);
      border-radius: 18px;
      background: var(--panel);
      color: var(--orange-dark);
      font-size: 19px;
      font-weight: 800;
      text-decoration: none;
    }

    a.app-link.family {
      border-color: var(--berry);
      color: var(--berry);
    }

    a.app-link.clients {
      border-color: var(--pink);
      color: var(--pink-dark);
    }
  </style>
</head>
<body>
  <main>
    <h1>My Work Hours</h1>

    <section class="work">
      <h2>Add a work day</h2>
      <div class="card-body">
        <form id="hours-form" action="https://script.google.com/macros/s/AKfycbynTo_fuy09h4OdRopmt0B9Dru4mN5R84tMr5YH3XRf3ZYsrm-BeztudQGYbaHcu-ozNw/exec" method="get" accept-charset="UTF-8">
          <label class="field" for="work-date">
            Which day?
            <div class="date-row">
              <input id="work-date" name="date" type="date" required>
              <span class="day-inline" id="work-day-name"></span>
            </div>
          </label>

          <div class="time-row">
            <label class="field" for="start-time">
              I started at
              <input id="start-time" name="start" type="time" required>
            </label>
            <label class="field" for="end-time">
              I finished at
              <input id="end-time" name="end" type="time" required>
            </label>
          </div>

          <p class="breaks-title">Breaks (if you had any)</p>
          <div id="break-list"></div>
          <button type="button" class="add-break" id="add-break">Add a break</button>

          <div class="preview" id="preview">Fill in the times to see your hours.</div>

          <button type="submit" class="primary">Save this day</button>
          <p class="note">Your weekly total and overtime show right after saving.</p>
        </form>
      </div>
    </section>

    <section class="vacation">
      <h2>Add a vacation day</h2>
      <div class="card-body">
        <form action="https://script.google.com/macros/s/AKfycbynTo_fuy09h4OdRopmt0B9Dru4mN5R84tMr5YH3XRf3ZYsrm-BeztudQGYbaHcu-ozNw/exec" method="get" accept-charset="UTF-8">
          <input type="hidden" name="action" value="vacation">

          <label class="field" for="vacation-date">
            Which day?
            <div class="date-row">
              <input id="vacation-date" name="date" type="date" required>
              <span class="day-inline" id="vacation-day-name"></span>
            </div>
          </label>

          <label class="check">
            <input id="use-overtime" name="useOvertime" type="checkbox">
            Pay this day with my saved overtime (5 hours)
          </label>

          <button type="submit" class="primary vacation-btn">Save vacation day</button>
        </form>
      </div>
    </section>

    <a class="app-link" href="https://script.google.com/macros/s/AKfycbynTo_fuy09h4OdRopmt0B9Dru4mN5R84tMr5YH3XRf3ZYsrm-BeztudQGYbaHcu-ozNw/exec">
      See my totals, my last days, and the Google Sheet
    </a>

    <a class="app-link family" href="https://script.google.com/macros/s/AKfycbynTo_fuy09h4OdRopmt0B9Dru4mN5R84tMr5YH3XRf3ZYsrm-BeztudQGYbaHcu-ozNw/exec?tab=family">
      Family To-Do
    </a>

    <a class="app-link clients" href="https://script.google.com/macros/s/AKfycbynTo_fuy09h4OdRopmt0B9Dru4mN5R84tMr5YH3XRf3ZYsrm-BeztudQGYbaHcu-ozNw/exec?tab=clients">
      Client Hours
    </a>
  </main>

  <script>
    function byId(id) { return document.getElementById(id); }

    function localDateValue(date) {
      var offsetMs = date.getTimezoneOffset() * 60 * 1000;
      return new Date(date.getTime() - offsetMs).toISOString().slice(0, 10);
    }

    byId('work-date').value = localDateValue(new Date());
    byId('vacation-date').value = localDateValue(new Date());

    /* ----- show the day of the week under each date ----- */

    function weekdayOf(value) {
      var match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(value || '');
      if (!match) return '';
      var date = new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
      var days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      return days[date.getDay()];
    }

    function updateDayNames() {
      byId('work-day-name').textContent = weekdayOf(byId('work-date').value);
      byId('vacation-day-name').textContent = weekdayOf(byId('vacation-date').value);
    }

    byId('work-date').addEventListener('input', updateDayNames);
    byId('vacation-date').addEventListener('input', updateDayNames);
    updateDayNames();

    /* ----- break rows ----- */

    function addBreakRow() {
      var row = document.createElement('div');
      row.className = 'break-row';

      var start = document.createElement('input');
      start.type = 'time';
      start.name = 'breakStart';
      start.className = 'break-start';
      start.setAttribute('aria-label', 'Break start time');

      var end = document.createElement('input');
      end.type = 'time';
      end.name = 'breakEnd';
      end.className = 'break-end';
      end.setAttribute('aria-label', 'Break end time');

      var remove = document.createElement('button');
      remove.type = 'button';
      remove.className = 'remove-break';
      remove.textContent = 'Remove';
      remove.addEventListener('click', function () {
        row.remove();
        updatePreview();
      });

      row.appendChild(start);
      row.appendChild(end);
      row.appendChild(remove);
      byId('break-list').appendChild(row);
    }

    byId('add-break').addEventListener('click', function () {
      addBreakRow();
    });

    /* ----- live preview and validation ----- */

    function parseTime(text) {
      var match = /^(\d{1,2}):(\d{2})$/.exec(String(text || '').trim());
      if (!match) return null;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function minutesLabel(total) {
      var hours = Math.floor(total / 60);
      var minutes = total % 60;
      if (hours === 0) return minutes + ' min';
      if (minutes === 0) return hours + ' h';
      return hours + ' h ' + minutes + ' min';
    }

    function checkForm() {
      var start = parseTime(byId('start-time').value);
      var end = parseTime(byId('end-time').value);

      if (start === null || end === null) {
        return { ok: false, gentle: true, text: 'Fill in the times to see your hours.' };
      }
      if (end <= start) {
        return { ok: false, text: 'The end time must be after the start time.' };
      }

      var rows = document.querySelectorAll('#break-list .break-row');
      var ranges = [];
      for (var i = 0; i < rows.length; i++) {
        var startText = rows[i].querySelector('.break-start').value;
        var endText = rows[i].querySelector('.break-end').value;
        if (!startText && !endText) continue;

        var bs = parseTime(startText);
        var be = parseTime(endText);
        if (bs === null || be === null) {
          return { ok: false, gentle: true, text: 'Fill in both times of the break.' };
        }
        if (be <= bs) {
          return { ok: false, text: 'A break must end after it starts.' };
        }
        if (bs < start || be > end) {
          return { ok: false, text: 'Breaks must be between the start time and the end time.' };
        }
        ranges.push({ start: bs, end: be });
      }

      ranges.sort(function (a, b) { return a.start - b.start; });
      var breakTotal = 0;
      var curStart = null;
      var curEnd = null;
      ranges.forEach(function (r) {
        if (curEnd === null) { curStart = r.start; curEnd = r.end; }
        else if (r.start <= curEnd) { curEnd = Math.max(curEnd, r.end); }
        else { breakTotal += curEnd - curStart; curStart = r.start; curEnd = r.end; }
      });
      if (curEnd !== null) breakTotal += curEnd - curStart;

      var worked = (end - start) - breakTotal;
      if (worked <= 0) {
        return { ok: false, text: 'The breaks cover the whole work time.' };
      }

      var text = 'You worked ' + minutesLabel(worked);
      if (breakTotal > 0) text += ' (breaks: ' + minutesLabel(breakTotal) + ')';
      return { ok: true, text: text };
    }

    function updatePreview() {
      var result = checkForm();
      var preview = byId('preview');
      preview.textContent = result.text;
      preview.className = (result.ok || result.gentle) ? 'preview' : 'preview bad';
    }

    byId('hours-form').addEventListener('input', updatePreview);

    byId('hours-form').addEventListener('submit', function (event) {
      var result = checkForm();
      if (!result.ok) {
        event.preventDefault();
        var preview = byId('preview');
        preview.textContent = result.text;
        preview.className = 'preview bad';
      }
    });
  </script>
</body>
</html>
