<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f11;
      --text: #f3f3f6;
      --text-muted: #8e8e9f;
      --accent: #4a9eff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 40px;
      letter-spacing: -0.5px;
    }

    .book-item {
      margin-bottom: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .book-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
    }

    .read-btn {
      display: inline-block;
      text-decoration: none;
      background: #1f1f24;
      color: var(--text);
      border: 1px solid #2d2d35;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .read-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f0f11;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Library</h1>
    
    <div class="book-item">
      <div class="book-title">Sîya Evînê</div>
      <a href="/books/reader.html?book=siya_evine" class="read-btn">Read</a>
    </div>
    
    <div class="book-item">
      <div class="book-title">L’épopée de Gilgamesh</div>
      <a href="/books/reader.html?book=gilgamesh" class="read-btn">Read</a>
    </div>

    <div class="book-item">
      <div class="book-title">Спитайте Мієчку</div>
      <a href="/books/reader.html?book=spytaite_miechku" class="read-btn">Read</a>
    </div>
  </div>
</body>
</html>
