<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Addition Calculator</title>
  <style>
    :root {
      --ink: #1f2937;
      --label: #6b21a8;
      --border: #d8b4fe;
      --field: #faf5ff;
      --field-readonly: #dcfce7;
      --field-readonly-border: #86efac;
      --field-readonly-text: #14532d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.75), transparent 35%),
        linear-gradient(160deg, #ffd8ea 0%, #ffeec7 100%);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: 820px;
    }

    .inputs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 700;
      color: var(--label);
    }

    input {
      width: 100%;
      height: 68px;
      border-radius: 18px;
      border: 2px solid var(--border);
      background: var(--field);
      color: var(--ink);
      font-size: 1.2rem;
      font-weight: 700;
      padding: 0 14px;
    }

    input::placeholder {
      color: #9ca3af;
    }

    input[readonly] {
      background: var(--field-readonly);
      border-color: var(--field-readonly-border);
      color: var(--field-readonly-text);
    }

  </style>
</head>
<body>
  <main class="shell">
    <div class="inputs">
      <label for="fromTime">
        Von
        <input id="fromTime" type="text" inputmode="numeric" placeholder="12:00" maxlength="5" autocomplete="off" spellcheck="false">
      </label>

      <label for="untilTime">
        Bis
        <input id="untilTime" type="text" inputmode="numeric" placeholder="15:00" maxlength="5" autocomplete="off" spellcheck="false">
      </label>

      <label for="newUntilTime">
        Neues Bis
        <input id="newUntilTime" type="text" placeholder="16:00" maxlength="5" readonly>
      </label>
    </div>
  </main>

  <script>
    function calculateExtraTime(totalMinutes) {
      return Math.floor(totalMinutes / 45) * 15;
    }

    function formatTypedTime(value) {
      var digits = value.replace(/\D/g, "").slice(0, 4);

      if (digits.length < 3) {
        return digits;
      }

      return digits.slice(0, 2) + ":" + digits.slice(2);
    }

    function timeToMinutes(value) {
      if (!value || !value.includes(":")) {
        return null;
      }

      var parts = value.split(":");
      var hours = Number(parts[0]);
      var minutes = Number(parts[1]);

      if (!Number.isInteger(hours) || !Number.isInteger(minutes)) {
        return null;
      }

      if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) {
        return null;
      }

      return (hours * 60) + minutes;
    }

    function minutesToTime(totalMinutes) {
      var normalized = ((totalMinutes % 1440) + 1440) % 1440;
      var hours = Math.floor(normalized / 60);
      var minutes = normalized % 60;
      return String(hours).padStart(2, "0") + ":" + String(minutes).padStart(2, "0");
    }

    var fromTimeInput = document.getElementById("fromTime");
    var untilTimeInput = document.getElementById("untilTime");
    var newUntilTimeInput = document.getElementById("newUntilTime");

    function handleTimeTyping(event) {
      event.target.value = formatTypedTime(event.target.value);
      updateNewUntil();
    }

    function updateNewUntil() {
      var fromMinutes = timeToMinutes(fromTimeInput.value);
      var untilMinutes = timeToMinutes(untilTimeInput.value);

      if (fromMinutes === null || untilMinutes === null) {
        newUntilTimeInput.value = "";
        return;
      }

      var duration = untilMinutes - fromMinutes;
      if (duration < 0) {
        duration += 1440;
      }

      var newUntilMinutes = untilMinutes + calculateExtraTime(duration);
      newUntilTimeInput.value = minutesToTime(newUntilMinutes);
    }

    fromTimeInput.addEventListener("input", handleTimeTyping);
    untilTimeInput.addEventListener("input", handleTimeTyping);
  </script>
</body>
</html>
